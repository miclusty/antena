name: Deploy Antena

on:
  push:
    branches: [main]
    paths:
      - 'packages/antena/**'
  workflow_dispatch:

jobs:
  deploy-antena:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 11.5.0 }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install & Build
        run: |
          pnpm install --frozen-lockfile || true
          pnpm --filter antena build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          PUBLIC_API_BASE: ${{ vars.PUBLIC_API_BASE }}
          PUBLIC_AKIRA_BASE: ${{ vars.PUBLIC_AKIRA_BASE }}

      - name: Deploy to Cloudflare Pages
        run: |
          pnpm --filter antena exec wrangler pages deploy dist --project-name antena --commit-message "Deploy from GitHub Actions"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
