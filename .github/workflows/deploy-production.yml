name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.5.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile || true
      - run: pnpm typecheck
      - run: pnpm lint

  deploy-api:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.5.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile || true
      - name: Apply D1 migrations
        run: pnpm --filter @akira/api exec wrangler d1 migrations apply DB --env=production --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy API Worker to production
        run: pnpm --filter @akira/api exec wrangler deploy --config wrangler.production.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-antena:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.5.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile || true
      - name: Build Antena (with production env)
        run: |
          # The frontend calls /api/* with this base URL. Today we
          # serve the API from the Cloudflare Worker URL
          # (akira-api.miclusty.workers.dev). When the custom
          # domain api.antena.com.ar is wired up (DEBT #2 — needs
          # dns:write scope on the API token), update both lines
          # to https://api.antena.com.ar.
          echo "PUBLIC_API_BASE=https://akira-api.miclusty.workers.dev" > packages/antena/.env.production
          echo "PUBLIC_AKIRA_BASE=https://akira-api.miclusty.workers.dev" >> packages/antena/.env.production
          pnpm --filter antena build
      - name: Deploy Antena to Pages
        run: |
          pnpm --filter antena exec wrangler pages deploy dist --project-name=antena --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
