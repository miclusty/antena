name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      # pnpm 11 changed the build-allowlist workflow. The build
      # allowlist must be approved via `pnpm approve-builds` BEFORE
      # the install step can run native build scripts (esbuild,
      # workerd, better-sqlite3, sharp). --all is the non-interactive
      # flag. After approve, the second install with the allowlist in
      # place succeeds.
      - run: pnpm install --frozen-lockfile
        env:
          # pnpm 11.5.0 doesn't read pnpm-workspace.yaml's
          # allowedBuildScripts at install time (a pnpm bug). The
          # env var name is 'pnpm_config_<key>' (NOT
          # PNPM_ALLOWED_BUILDSCRIPTS). Setting
          # pnpm_config_allowedBuildScripts to '*' allows all
          # pending build scripts (esbuild, workerd,
          # better-sqlite3, sharp) and install returns exit 0.
          pnpm_config_allowedBuildScripts: 'better-sqlite3,esbuild,sharp,workerd'
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm test:e2e
        env:
          CI: true

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
        env:
          pnpm_config_allowedBuildScripts: 'better-sqlite3,esbuild,sharp,workerd'
      - run: pnpm --filter antena build
      - run: pnpm --filter antena preview &
      - run: sleep 5
      - run: pnpm lighthouse

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [test, lighthouse]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: antena
          directory: packages/antena/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-prod:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [test, lighthouse]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: antena
          directory: packages/antena/dist
          branch: main
      - name: Apply D1 migrations
        run: |
          wrangler d1 migrations apply DB --remote --env=production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy API Worker
        run: |
          cd packages/api && wrangler deploy --env=production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
