name = "akira-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Production env routes (apex → www, /noticia/* legacy)
routes = [
  { pattern = "www.antena.com.ar/noticia/*", zone_name = "antena.com.ar" },
  { pattern = "www.antena.com.ar/noticia",  zone_name = "antena.com.ar" },
  { pattern = "antena.com.ar/*", zone_name = "antena.com.ar" },
  { pattern = "antena.com.ar",   zone_name = "antena.com.ar" },
]

# ── D1 ────────────────────────────────────────────────────────────
[[d1_databases]]
binding = "DB"
database_name = "antena-prod"
database_id = "ef096b0b-bab6-4b0b-bf5a-30b2dd5bd17c"
migrations_dir = "migrations"

# ── KV (edge cache) ───────────────────────────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id = "df27599523364a02bd294ff97acb1f5c"

# ── Vectorize (semantic search) ───────────────────────────────────
[[vectorize]]
binding = "VECTORS"
index_name = "news_embeddings"

# ── Analytics Engine (telemetry) ──────────────────────────────────
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "feed_events"

# ── Workers AI (embeddings for Vectorize) ─────────────────────────
[[ai]]
binding = "AI"

# ── Cron Triggers ─────────────────────────────────────────────────
[triggers]
crons = ["0 */2 * * *"]

# ── Vars ──────────────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
API_BASE = "https://www.antena.com.ar"
PUBLIC_WEB_BASE = "https://www.antena.com.ar"
# AKIRA_URL set via: wrangler secret put AKIRA_URL --env=production
# AKIRA_ADMIN_KEY set via: wrangler secret put AKIRA_ADMIN_KEY --env=production
# DISCORD_WEBHOOK_URL set via: wrangler secret put DISCORD_WEBHOOK_URL --env=production
