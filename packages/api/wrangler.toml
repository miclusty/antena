name = "akira-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Phase 3 Task 32: route the legacy /noticia/<uuid> path to this
# worker (which has the 11K overflow redirects in KV) BEFORE
# Cloudflare Pages sees the request. The worker's
# legacyRedirectMiddleware returns 301 to the canonical slug
# URL, so the request never reaches Pages.
# Only /noticia/* is routed — the rest of www.antena.com.ar
# (homepage, /buscar, /ciudad/*, /categoria/*, /<year>/<month>/*)
# continues to be served by Pages.
routes = [
  { pattern = "www.antena.com.ar/noticia/*", zone_name = "antena.com.ar" },
  { pattern = "www.antena.com.ar/noticia",  zone_name = "antena.com.ar" },
]

# Production bindings. Local dev uses wrangler dev with
# --local flag, which uses Miniflare's sqlite/R2/KV
# emulators and doesn't need real IDs.
#
# The `name = "akira-api"` (no env suffix) keeps the
# deployment at https://akira-api.miclusty.workers.dev,
# which is the URL the frontend calls.

# ── D1 ────────────────────────────────────────────────────────────
# Production database. Created 2026-06-12 in WEUR region.
[[d1_databases]]
binding = "DB"
database_name = "antena-prod"
database_id = "ef096b0b-bab6-4b0b-bf5a-30b2dd5bd17c"
migrations_dir = "migrations"

# ── KV (edge cache) ───────────────────────────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id = "df27599523364a02bd294ff97acb1f5c"

# ── R2 (image storage) ────────────────────────────────────────────
# [[r2_buckets]]
# binding = "IMAGES"
# bucket_name = "antena-images"

# ── Vectorize (semantic search) ───────────────────────────────────
[[vectorize]]
binding = "VECTORS"
index_name = "news_embeddings"

# ── Queues (image pipeline) ───────────────────────────────────────
# NOTE: wrangler deploy fails with "Queue already has a consumer" if
# these are uncommented (because the consumer was registered manually
# via the dashboard). The existing consumer is correct and functional.
# To re-deploy the worker, temporarily comment this section, deploy,
# then re-enable. See deploy docs.
# [[queues.producers]]
# binding = "IMAGE_QUEUE"
# queue = "image-pipeline"
#
# [[queues.consumers]]
# queue = "image-pipeline"
# max_batch_size = 10
# max_batch_timeout = 30

# ── Vars ──────────────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
API_BASE = "https://api.antena.com.ar"
PUBLIC_WEB_BASE = "https://www.antena.com.ar"
