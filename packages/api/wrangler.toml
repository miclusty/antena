name = "akira-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Phase 3 Task 32: route the legacy /noticia/<uuid> path to this
# worker (which has the 11K overflow redirects in KV) BEFORE
# Cloudflare Pages sees the request. The worker's
# legacyRedirectMiddleware returns 301 to the canonical slug
# URL, so the request never reaches Pages.
# Only /noticia/* is routed — the rest of www.antena.com.ar
# (homepage, /buscar, /ciudad/*, /categoria/*, /<year>/<month>/*)
# continues to be served by Pages.
routes = [
  { pattern = "www.antena.com.ar/noticia/*", zone_name = "antena.com.ar" },
  { pattern = "www.antena.com.ar/noticia",  zone_name = "antena.com.ar" },
  # Apex → www 301. Intercepts every request to antena.com.ar
  # (the bare domain) and 301s it to www.antena.com.ar/<path>.
  # Necessary because the Pages _redirects file can't redirect
  # from one host to another when Pages is bound to that host.
  { pattern = "antena.com.ar/*", zone_name = "antena.com.ar" },
  { pattern = "antena.com.ar",   zone_name = "antena.com.ar" },
]

# Production bindings. Local dev uses wrangler dev with
# --local flag, which uses Miniflare's sqlite/R2/KV
# emulators and doesn't need real IDs.
#
# The `name = "akira-api"` (no env suffix) keeps the
# deployment at https://akira-api.miclusty.workers.dev,
# which is the URL the frontend calls.

# ── D1 ────────────────────────────────────────────────────────────
# Production database. Created 2026-06-12 in WEUR region.
[[d1_databases]]
binding = "DB"
database_name = "antena-prod"
database_id = "ef096b0b-bab6-4b0b-bf5a-30b2dd5bd17c"
migrations_dir = "migrations"

# ── KV (edge cache) ───────────────────────────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id = "df27599523364a02bd294ff97acb1f5c"

# ── R2 (image storage) ────────────────────────────────────────────
# [[r2_buckets]]
# binding = "IMAGES"
# bucket_name = "antena-images"

# ── Vectorize (semantic search) ───────────────────────────────────
[[vectorize]]
binding = "VECTORS"
index_name = "news_embeddings"

# ── Analytics Engine (telemetry) ──────────────────────────────────
# NOTE 2026-07-09: Cloudflare deploy fails with "10089 enable Analytics Engine"
# until the user creates the `feed_events` dataset in dash.cloudflare.com.
# The binding stays commented out for now; track endpoints in code guard with
# `if (env.ANALYTICS)`. Re-enable when Analytics Engine is provisioned.
#
# [[analytics_engine_datasets]]
# binding = "ANALYTICS"
# dataset = "feed_events"

# ── Workers AI (embeddings for Vectorize) ─────────────────────────
[ai]
binding = "AI"

# ── Cron Triggers ─────────────────────────────────────────────────
# NOTE 2026-07-09: The Cloudflare Workers free plan allows only 5 cron
# triggers per account and all 5 slots are taken. The refresh handler
# is wired in code (src/crons/refresh.ts) and exposed via GET /__cron/refresh
# for manual triggers, but [triggers] is commented out. To activate, free
# a slot in the Cloudflare dashboard → Workers → Triggers and re-enable.
#
# [triggers]
# crons = ["0 */2 * * *"]



# ── Queues (image pipeline) ───────────────────────────────────────
# NOTE: wrangler deploy fails with "Queue already has a consumer" if
# these are uncommented (because the consumer was registered manually
# via the dashboard). The existing consumer is correct and functional.
# To re-deploy the worker, temporarily comment this section, deploy,
# then re-enable. See deploy docs.
# [[queues.producers]]
# binding = "IMAGE_QUEUE"
# queue = "image-pipeline"
#
# [[queues.consumers]]
# queue = "image-pipeline"
# max_batch_size = 10
# max_batch_timeout = 30

# ── Vars ──────────────────────────────────────────────────────────
[vars]
ENVIRONMENT = "production"
API_BASE = "https://api.antena.com.ar"
PUBLIC_WEB_BASE = "https://www.antena.com.ar"
AKIRA_URL = "https://tries-critical-donald-rand.trycloudflare.com"
