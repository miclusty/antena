[project]
name = "akira"
version = "4.0.0"
description = "AKIRA - PULSO Extraction Engine"
requires-python = ">=3.9"

dependencies = [
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.29.0",
    "pydantic>=2.6.0",
    "pydantic-settings>=2.0.0",
    "aiohttp>=3.9.0",
    "feedparser>=6.0.11",
    "newspaper4k>=0.9.0",
    "goose3>=3.1.19",
    "playwright>=1.42.0",
    "lxml>=5.1.0",
    "beautifulsoup4>=4.12.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0.0", "pytest-asyncio>=0.23.0", "httpx>=0.27.0"]
redis = ["redis>=5.0.0"]



[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.setuptools.packages.find]
include = ["akira*"]

[tool.mypy]
# AKIRA mypy configuration. Scope: only modules created in Iter 1-3 plus
# their direct dependencies. The legacy main.py has too many pre-existing
# mypy issues to be useful to lint — covered by integration tests instead.
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
explicit_package_bases = true
mypy_path = "."

files = [
    "akira/db/connection.py",
    "akira/core/llm_client.py",
    "akira/core/cache_redis.py",
    "akira/core/cache.py",
    "akira/config.py",
]

exclude = [
    "akira/main.py",
    "akira/scripts/",
    "akira/extractors/",
    "akira/services/",
    "akira/data/",
]