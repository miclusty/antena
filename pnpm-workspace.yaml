packages:
  - "packages/*"

# pnpm 11: use "allowBuilds" (camelCase) to whitelist which native
# packages can run their install scripts. Without this, esbuild, workerd,
# and better-sqlite3 fail to build, and `pnpm install` returns
# non-zero (which breaks CI's `pnpm install --frozen-lockfile`).
allowBuilds:
  better-sqlite3: true
  esbuild: true
  workerd: true
