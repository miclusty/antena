packages:
  - "packages/*"

# pnpm 11 reads allowedBuildScripts from pnpm-workspace.yaml. This
# is the new home for the old pnpm.onlyBuiltDependencies key
# (which pnpm 11 ignores if set in package.json).
allowedBuildScripts:
  - "*"

# pnpm 11 also runs `pnpm install` before any script (e.g.
# `pnpm typecheck`). If install fails (e.g. with the same
# ERR_PNPM_IGNORED_BUILDS that pnpm-workspace.yaml's
# allowedBuildScripts is supposed to suppress), the script
# never runs. Disabling this verification means scripts run
# directly without re-checking deps — the user is responsible
# for running install first.
verifyDepsBeforeRun: false
