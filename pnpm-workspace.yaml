packages:
  - "packages/*"

allowBuilds:
  better-sqlite3: set this to true or false
  esbuild: set this to true or false
  sharp: set this to true or false
  workerd: set this to true or false

# pnpm 11 reads allowedBuildScripts from pnpm-workspace.yaml with
# this exact YAML syntax (NOT package.json's "pnpm" key — that was
# deprecated). Confirmed via `pnpm config get allowedBuildScripts`
# after this commit.
allowedBuildScripts:
  - "*"
